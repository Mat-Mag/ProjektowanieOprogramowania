<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Proste karty</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      width: 260px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .card-text {
      font-size: 14px;
      color: #555;
      margin-bottom: 16px;
    }

    .card-button {
      align-self: flex-start;
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .card-button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <h1>Gicik</h1>

  <div class="cards">
    <div class="card">
      <div>
        <div class="card-title">Karta 1</div>
        <div class="card-text">
          To jest tekst Kozłowskiego
      </div>
      <button class="card-button">Zobacz więcej</button>
    </div>

    <div class="card">
      <div>
        <div class="card-title">Karta 2</div>
        <div class="card-text">          
          <p>Jakieś głupoty - Mati</p>
        </div>
      </div>
      <button class="card-button">Czytaj</button>
    </div>

    <div class="card">
      <div>
        <div class="card-title">Karta 3</div>
        <div class="card-text">
         <h1>Damn super wizytówka, ja ją zrobiłem Mikołaj</h1><h3>(tak naprawdę Mati mi dał cały plik, ja tylko wrzuciłem mój tekst)</h3>
        </div>
      </div>
      <button class="card-button">Więcej</button>
    </div>
  </div>
</body>
</html>
